<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Edges: colored by flow direction -->
  <g stroke-width="1.1" fill="none">
    <line x1="130" y1="200" x2="290" y2="120" stroke="#d97706" stroke-opacity="0.45"/>
    <line x1="130" y1="200" x2="290" y2="290" stroke="#d97706" stroke-opacity="0.45"/>
    <line x1="290" y1="120" x2="460" y2="150" stroke="#d97706" stroke-opacity="0.55"/>
    <line x1="290" y1="120" x2="460" y2="260" stroke="#e11d48" stroke-opacity="0.35"/>
    <line x1="290" y1="290" x2="460" y2="150" stroke="#d97706" stroke-opacity="0.45"/>
    <line x1="290" y1="290" x2="460" y2="330" stroke="#d97706" stroke-opacity="0.4"/>
    <line x1="460" y1="150" x2="620" y2="100" stroke="#4f46e5" stroke-opacity="0.45"/>
    <line x1="460" y1="150" x2="620" y2="200" stroke="#0d9488" stroke-opacity="0.5"/>
    <line x1="460" y1="260" x2="620" y2="200" stroke="#e11d48" stroke-opacity="0.35"/>
    <line x1="460" y1="260" x2="620" y2="310" stroke="#e11d48" stroke-opacity="0.35"/>
    <line x1="460" y1="330" x2="620" y2="310" stroke="#d97706" stroke-opacity="0.4"/>
    <line x1="620" y1="100" x2="720" y2="170" stroke="#4f46e5" stroke-opacity="0.4"/>
    <line x1="620" y1="200" x2="720" y2="170" stroke="#0d9488" stroke-opacity="0.5"/>
    <line x1="620" y1="200" x2="720" y2="290" stroke="#2563eb" stroke-opacity="0.45"/>
    <line x1="620" y1="310" x2="720" y2="290" stroke="#2563eb" stroke-opacity="0.4"/>
  </g>
  <!-- Nodes: grouped by role/region -->
  <!-- Market hub left -->
  <circle cx="130" cy="200" r="18" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.8"/>
  <!-- Production nodes -->
  <circle cx="290" cy="120" r="11" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="290" cy="290" r="15" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <!-- Central hub (largest) -->
  <circle cx="460" cy="150" r="20" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.8"/>
  <!-- Risk node -->
  <circle cx="460" cy="260" r="13" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
  <circle cx="460" cy="330" r="9"  fill="#fef3c7" stroke="#d97706" stroke-width="1.2"/>
  <!-- Consumer/market nodes right -->
  <circle cx="620" cy="100" r="9"  fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.2"/>
  <circle cx="620" cy="200" r="12" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <circle cx="620" cy="310" r="10" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.2"/>
  <circle cx="720" cy="170" r="14" fill="#ccfbf1" stroke="#0d9488" stroke-width="1.5"/>
  <circle cx="720" cy="290" r="11" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
</svg>
