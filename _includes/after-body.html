<script>
(function () {
  // ── DARK / LIGHT TOGGLE ──────────────────────────────────────────
  function paletteIsDark(p) { return p && p.indexOf('dark') !== -1; }
  function getPalette() {
    try { return localStorage.getItem('edgar-palette') || 'editorial-light'; } catch (e) { return 'editorial-light'; }
  }
  function setPalette(p) {
    document.documentElement.setAttribute('data-palette', p);
    try { localStorage.setItem('edgar-palette', p); } catch (e) {}
    var btn = document.getElementById('palette-toggle');
    if (btn) btn.textContent = paletteIsDark(p) ? '○' : '●';
  }

  function injectToggle() {
    var navRight = document.querySelector('.navbar .navbar-nav.ms-auto')
                || document.querySelector('.navbar .quarto-navbar-tools')
                || document.querySelector('.navbar .navbar-collapse .navbar-nav:last-of-type');
    if (!navRight) return;
    if (document.getElementById('palette-toggle')) return;

    var btn = document.createElement('button');
    btn.id = 'palette-toggle';
    btn.type = 'button';
    btn.setAttribute('aria-label', 'Toggle light/dark mode');
    btn.title = 'Toggle light/dark';
    btn.className = 'palette-toggle';
    btn.textContent = paletteIsDark(getPalette()) ? '○' : '●';
    btn.addEventListener('click', function () {
      var current = getPalette();
      setPalette(paletteIsDark(current) ? 'editorial-light' : 'editorial-dark');
    });

    var li = document.createElement('li');
    li.className = 'nav-item palette-toggle-wrap';
    li.appendChild(btn);
    navRight.appendChild(li);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectToggle);
  } else {
    injectToggle();
  }

"/><path xmlns="http://www.w3.org/2000/svg" d="M6.586 14.414A2 2 0 0 1 5.172 15H3a1 1 0 0 1-1-1v-4a1 1 0 0 1 1-1h2.172a2 2 0 0 1 1.414.586l1.56 1.56a1.207 1.207 0 0 1 0 1.708z"/><path xmlns="http://www.w3.org/2000/svg" d="M9 3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2.172a2 2 0 0 1-.586 1.414l-1.56 1.56a1.207 1.207 0 0 1-1.708 0l-1.56-1.56A2 2 0 0 1 9 5.172z"/></g></g></g><g class="logo-glyph" style="--i:11"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="M15 6a9 9 0 0 0-9 9V3"/><path xmlns="http://www.w3.org/2000/svg" d="M21 18h-6"/><circle xmlns="http://www.w3.org/2000/svg" cx="18" cy="6" r="3"/><circle xmlns="http://www.w3.org/2000/svg" cx="6" cy="18" r="3"/></g></g></g><g class="logo-glyph" style="--i:12"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="M12.035 17.012a3 3 0 0 0-3-3l-.311-.002a.72.72 0 0 1-.505-1.229l1.195-1.195A2 2 0 0 1 10.828 11H12a2 2 0 0 0 0-4H9.243a3 3 0 0 0-2.122.879l-2.707 2.707A4.83 4.83 0 0 0 3 14a8 8 0 0 0 8 8h2a8 8 0 0 0 8-8V7a2 2 0 1 0-4 0v2a2 2 0 1 0 4 0"/><path xmlns="http://www.w3.org/2000/svg" d="M13.888 9.662A2 2 0 0 0 17 8V5A2 2 0 1 0 13 5"/><path xmlns="http://www.w3.org/2000/svg" d="M9 5A2 2 0 1 0 5 5V10"/><path xmlns="http://www.w3.org/2000/svg" d="M9 7V4A2 2 0 1 1 13 4V7.268"/></g></g></g><g class="logo-glyph" style="--i:13"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="M21 12a9 9 0 1 1-6.219-8.56"/></g></g></g><g class="logo-glyph" style="--i:14"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="M3 7V5a2 2 0 0 1 2-2h2"/><path xmlns="http://www.w3.org/2000/svg" d="M17 3h2a2 2 0 0 1 2 2v2"/><path xmlns="http://www.w3.org/2000/svg" d="M21 17v2a2 2 0 0 1-2 2h-2"/><path xmlns="http://www.w3.org/2000/svg" d="M7 21H5a2 2 0 0 1-2-2v-2"/><circle xmlns="http://www.w3.org/2000/svg" cx="12" cy="12" r="3"/><path xmlns="http://www.w3.org/2000/svg" d="m16 16-1.9-1.9"/></g></g></g><g class="logo-glyph" style="--i:15"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle xmlns="http://www.w3.org/2000/svg" cx="18" cy="5" r="3"/><circle xmlns="http://www.w3.org/2000/svg" cx="6" cy="12" r="3"/><circle xmlns="http://www.w3.org/2000/svg" cx="18" cy="19" r="3"/><line xmlns="http://www.w3.org/2000/svg" x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line xmlns="http://www.w3.org/2000/svg" x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></g></g></g><g class="logo-glyph" style="--i:16"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="M4 13V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v5"/><path xmlns="http://www.w3.org/2000/svg" d="M14 2v5a1 1 0 0 0 1 1h5"/><path xmlns="http://www.w3.org/2000/svg" d="M10 22v-5"/><path xmlns="http://www.w3.org/2000/svg" d="M14 19v-2"/><path xmlns="http://www.w3.org/2000/svg" d="M18 20v-3"/><path xmlns="http://www.w3.org/2000/svg" d="M2 13h20"/><path xmlns="http://www.w3.org/2000/svg" d="M6 20v-3"/></g></g></g><g class="logo-glyph" style="--i:17"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="M21 5H3"/><path xmlns="http://www.w3.org/2000/svg" d="M10 12H3"/><path xmlns="http://www.w3.org/2000/svg" d="M10 19H3"/><circle xmlns="http://www.w3.org/2000/svg" cx="17" cy="15" r="3"/><path xmlns="http://www.w3.org/2000/svg" d="m21 19-1.9-1.9"/></g></g></g><g class="logo-glyph" style="--i:18"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="M12 17v4"/><path xmlns="http://www.w3.org/2000/svg" d="M8 21h8"/><path xmlns="http://www.w3.org/2000/svg" d="m9 17 6.1-6.1a2 2 0 0 1 2.81.01L22 15"/><circle xmlns="http://www.w3.org/2000/svg" cx="8" cy="9" r="2"/><rect xmlns="http://www.w3.org/2000/svg" x="2" y="3" width="20" height="14" rx="2"/></g></g></g><g class="logo-glyph" style="--i:19"><g transform="translate(25.714285714285715 25.714285714285715) scale(2.857142857142857)"><g fill="none" stroke="var(--paper)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path xmlns="http://www.w3.org/2000/svg" d="m10.586 5.414-5.172 5.172"/><path xmlns="http://www.w3.org/2000/svg" d="m18.586 13.414-5.172 5.172"/><path xmlns="http://www.w3.org/2000/svg" d="M6 12h12"/><circle xmlns="http://www.w3.org/2000/svg" cx="12" cy="20" r="2"/><circle xmlns="http://www.w3.org/2000/svg" cx="12" cy="4" r="2"/><circle xmlns="http://www.w3.org/2000/svg" cx="20" cy="12" r="2"/><circle xmlns="http://www.w3.org/2000/svg" cx="4" cy="12" r="2"/></g></g></g></svg>`;
  function injectLogo() {
    var brand = document.querySelector('.navbar-brand');
    if (!brand || brand.querySelector('.logo-cycler')) return;
    var oldImg = brand.querySelector('img');
    if (oldImg) oldImg.remove();
    brand.insertAdjacentHTML('afterbegin', LOGO_CYCLER_SVG);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectLogo);
  } else {
    injectLogo();
  }

  // ── FILTER UI ────────────────────────────────────────────────────
  // Supports both hand-coded [data-filter-key] items AND Quarto auto-listing
  // items (grid .g-col-1 and default .quarto-post), which carry categories
  // as base64(encodeURIComponent(csv)) in data-categories.
  function decodeCats(el) {
    var raw = el.getAttribute('data-categories') || '';
    if (!raw) return [];
    try { return decodeURIComponent(atob(raw)).split(',').map(function (c) { return c.trim(); }); }
    catch (e) { return []; }
  }

  document.querySelectorAll('[data-filter-group]').forEach(function (group) {
    var buttons   = group.querySelectorAll('[data-filter]');
    var targetSel = group.getAttribute('data-filter-target');

    function getQuartoItems() {
      return document.querySelectorAll(
        targetSel + ' .g-col-1[data-categories], ' +
        targetSel + ' .quarto-post[data-categories]'
      );
    }
    function getHandItems()   { return document.querySelectorAll(targetSel + ' [data-filter-key]'); }

    function apply(active) {
      buttons.forEach(function (b) {
        b.classList.toggle('is-active', b.getAttribute('data-filter') === active);
      });

      getQuartoItems().forEach(function (it) {
        if (active === 'All') { it.style.display = ''; return; }
        var cats = decodeCats(it);
        it.style.display = (cats.indexOf(active) !== -1) ? '' : 'none';
      });

      getHandItems().forEach(function (it) {
        var keys = (it.getAttribute('data-filter-key') || '').split('|');
        it.style.display = (active === 'All' || keys.indexOf(active) !== -1) ? '' : 'none';
      });
    }

    buttons.forEach(function (b) {
      b.addEventListener('click', function () { apply(b.getAttribute('data-filter')); });
    });

    apply('All');

    // If the page was opened with a hash, activate the matching filter button
    var hash = decodeURIComponent(window.location.hash.replace(/^#/, '').replace(/\+/g, ' '));
    if (hash) {
      var matched = null;
      buttons.forEach(function (b) {
        if (b.getAttribute('data-filter') === hash) matched = b;
      });
      if (matched) apply(hash);
    }
  });

  // ── PROJECT STATUS BADGES ────────────────────────────────────────
  // Quarto prints custom listing fields as a hidden .card-other-values
  // table. Read each project's status and drop a clean Active / Closed
  // badge into the card corner.
  document.querySelectorAll('.card-other-values').forEach(function (table) {
    var cell = table.querySelector('td.status');
    var item = table.closest('.g-col-1');
    if (!cell || !item) return;
    var raw = (cell.textContent || '').trim().toLowerCase();
    if (!raw) return;
    var closed = raw === 'published';
    var badge = document.createElement('div');
    badge.className = 'listing-status';
    badge.setAttribute('data-state', closed ? 'closed' : 'active');
    badge.textContent = closed ? 'Closed' : 'Active';
    item.appendChild(badge);
  });

  // ── PAGE EXIT (GSAP) ─────────────────────────────────────────────
  // Fade main out before navigating; CSS fadeUp handles the entrance on load.
  function initPageExit() {
    if (typeof gsap === 'undefined') return;
    document.querySelectorAll('a[href]').forEach(function (link) {
      var href = link.getAttribute('href') || '';
      // Skip anchors, mailto, external, and target=_blank
      if (!href || href.charAt(0) === '#' || href.indexOf('mailto:') === 0 ||
          href.indexOf('http') === 0 || link.target === '_blank') return;
      link.addEventListener('click', function (e) {
        e.preventDefault();
        var dest = link.href; // use resolved href for relative paths
        var mainEl = document.querySelector('main') || document.body;
        gsap.to(mainEl, {
          opacity: 0, y: -8, duration: 0.42, ease: 'power2.inOut',
          onComplete: function () { window.location.href = dest; }
        });
      });
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPageExit);
  } else {
    initPageExit();
  }

  // ── STAGGER DELAYS ───────────────────────────────────────────
  // Sets --stagger-delay on each item so CSS animation-delay is
  // per-element without repeating nth-child rules in CSS.
  function initStagger() {
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    // Grid listing cards (projects, portfolio)
    document.querySelectorAll('.quarto-listing-container-grid .g-col-1').forEach(function (el, i) {
      el.style.setProperty('--stagger-delay', (350 + i * 55) + 'ms');
    });

    // Publication rows
    document.querySelectorAll('#pub-list .row-pub').forEach(function (el, i) {
      el.style.setProperty('--stagger-delay', (200 + i * 60) + 'ms');
    });

    // Conference rows
    document.querySelectorAll('#conf-list .row-conf').forEach(function (el, i) {
      el.style.setProperty('--stagger-delay', (200 + i * 55) + 'ms');
    });

    // Blog posts
    document.querySelectorAll('.quarto-listing-default .quarto-post').forEach(function (el, i) {
      el.style.setProperty('--stagger-delay', (200 + i * 65) + 'ms');
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initStagger);
  } else {
    initStagger();
  }
})();
</script>
