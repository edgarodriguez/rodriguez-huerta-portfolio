project:
  type: website
  output-dir: _site
  resources:
    - ".nojekyll"
    - "assets/**"
    - "cv.pdf"
  render:
    - "*.qmd"
    - "projects/*.qmd"
    - "publications/*.qmd"
    - "portfolio/**/*.qmd"
    - "conferences/*.qmd"
    - "blog/*.qmd"
    - "!notebook/"
    - "!_includes/"
    - "!CLAUDE.md"
    - "!README.md"
    - "!project_specs.md"

website:
  title: "Rodríguez-Huerta, Edgar"
  description: "Research portfolio — sustainability science and complexity"
  site-url: "https://edgarrodriguezhuerta.github.io/rodriguez-huerta-portfolio"
  # Google Analytics — replace G-XXXXXXXXXX with your Measurement ID
  # from Google Analytics > Admin > Data Streams > Web stream details
  google-analytics: "G-XXXXXXXXXX"
  open-graph: true
  twitter-card: true
  navbar:
    title: "Rodríguez-Huerta, Edgar"
    background: light
    pinned: false
    collapse-below: lg
    right:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: About
      - href: projects.qmd
        text: Projects
      - href: publications.qmd
        text: Publications
      - href: portfolio.qmd
        text: Portfolio
      - href: conferences.qmd
        text: Conferences
      - text: CV
        menu:
          - href: cv.qmd
            text: Curriculum Vitae
          - href: cv-negative.qmd
            text: CV of Failures
      - href: blog.qmd
        text: Blog
  page-footer:
    border: true
    left: "© 2026 Edgar Rodríguez-Huerta, PhD"
    right:
      - text: "Built with Quarto and designed with Claude Design"
        href: https://quarto.org

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    page-layout: full
    smooth-scroll: true
    link-external-icon: false
    link-external-newwindow: true
    include-in-header: _includes/head.html
    include-after-body: _includes/after-body.html
    anchor-sections: false
